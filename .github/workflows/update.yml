name: Update Amp version

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Set up Nix cache
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: ampcode
          extraPullNames: devenv
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          if nix develop -c ./scripts/update.sh --check; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            CURRENT_VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)
            LATEST_VERSION=$(curl -sf https://static.ampcode.com/cli/cli-version.txt)

            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version and hash
        if: steps.check.outputs.update_needed == 'true'
        run: nix develop -c ./scripts/update.sh

      - name: Create pull request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "amp-cli: ${{ steps.check.outputs.current }} -> ${{ steps.check.outputs.latest }}"
          title: "amp-cli: ${{ steps.check.outputs.current }} -> ${{ steps.check.outputs.latest }}"
          body: This PR was automatically generated.
          branch: update-amp-${{ steps.check.outputs.latest }}
          delete-branch: true
          sign-commits: true

      - name: Enable auto-merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch
